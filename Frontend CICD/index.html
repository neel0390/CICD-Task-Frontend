<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🚀 My Static Website</h1>
        <p>Deployed using GitHub → AWS CodeBuild → AWS CodeDeploy → EC2</p>
    </header>

    <main>
        <!-- Image 1 -->
        <section class="image-section">
            <h2>First Image</h2>
            <img src="images/image1.jpg" alt="Strawberry Image">
            <p>This is a sample image displayed from EC2.</p>
        </section>

        <!-- Image 2 -->
        <section class="image-section">
            <h2>Second Image</h2>
            <img src="images/image2.jpg" alt="Static Website Image">
            <p>This is another image from the deployed static website.</p>
        </section>
    </main>

    <footer>
        <p>© 2026 My Website | AWS Deployment Demo</p>
    </footer>

</body>
</html>
